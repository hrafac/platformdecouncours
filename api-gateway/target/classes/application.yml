server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: candidates-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/candidates/**

        - id: job-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/**

        - id: ats-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ats/**

        - id: application-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/applications/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"

            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS

            allowedHeaders: "*"

            allowCredentials: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

instance:
  prefer-ip-address: true